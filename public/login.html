<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" type="image/png" href="/imgs/logo.png">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
    }

    .login-card h1 {
      margin: 0 0 8px;
      color: #fff;
      font-size: 1.6rem;
    }

    .login-card p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .login-card label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: .9rem;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(157, 100, 9, 0.616);
      background: #0b0b0b;
      color: #EAEAEA;
      outline: none;
      margin-bottom: 14px;
    }

    .login-card input:focus{
        border-color: rgba(231, 176, 89, 0.9);
  box-shadow: 0 0 0 3px rgba(231, 176, 89, 0.2);
    }

    .login-card button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
     .login-card button:hover{
         border-color: rgba(231, 176, 89, 0.9);
  box-shadow: 0 0 0 3px rgba(231, 176, 89, 0.2);
  color: #655130;
     }
    .msg {
      margin-top: 12px;
      color: #ffb3b3;
      min-height: 20px;
      font-size: .95rem;
    }

  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Acesso do Admin</h1>
      <p>Digite a senha para abrir o painel.</p>

      <form id="loginForm">
        <label for="password">Senha</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="ex:senha..."/>
        <button type="submit">Entrar</button>
      </form>

      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const password = document.getElementById('password');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password.value })
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        msg.textContent = data.error || 'Senha incorreta.';
        return;
      }

      window.location.href = '/admin';
    });
  </script>
</body>
</html>
